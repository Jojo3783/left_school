<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通模擬與觀測專案展示 (Traffic Simulation & Monitoring)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #020617;
            --primary-cyan: #06b6d4;
            --primary-emerald: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ---------------------------------
           Dynamic Background Animation
           --------------------------------- */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(6, 182, 212, 0.4); /* Cyan */
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: rgba(16, 185, 129, 0.3); /* Emerald */
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.3); /* Blue */
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.95); }
            100% { transform: translate(20px, 20px) scale(1.05); }
        }

        /* ---------------------------------
           Main Container
           --------------------------------- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        header {
            text-align: center;
            animation: fadeInDown 1s ease-out forwards;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 1.1rem;
            color: var(--primary-cyan);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ---------------------------------
           Project Cards Grid
           --------------------------------- */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 32px;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .project-card:nth-child(1) { animation-delay: 0.2s; }
        .project-card:nth-child(2) { animation-delay: 0.4s; }

        /* Hover Effects */
        .project-card:hover {
            transform: translateY(-10px);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(6, 182, 212, 0.4);
            box-shadow: 0 20px 40px -10px rgba(6, 182, 212, 0.25);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: 0.7s;
        }

        .project-card:hover::before {
            left: 150%;
        }

        /* Card Content */
        .card-icon {
            font-size: 2.8rem;
            margin-bottom: 24px;
            color: var(--primary-cyan);
            transition: transform 0.4s ease;
        }

        .project-card:nth-child(2) .card-icon {
            color: var(--primary-emerald);
        }

        .project-card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .card-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .card-action {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            transition: gap 0.3s ease;
        }

        .card-action i {
            font-size: 0.85rem;
            transition: transform 0.3s ease;
        }

        .project-card:hover .card-action {
            gap: 14px;
            color: var(--primary-cyan);
        }
        
        .project-card:nth-child(2):hover .card-action {
            color: var(--primary-emerald);
        }

        /* ---------------------------------
           Animations
           --------------------------------- */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------------------------------
           Responsive
           --------------------------------- */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2rem;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
            .project-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Ambient Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main Content -->
    <main class="container">
        <header>
            <h1>交通與車流模擬展示</h1>
            <p>Traffic Observation & Simulation Projects</p>
        </header>

        <div class="projects-grid">
            <!-- Project 1: Cemara (Traffic Map) -->
            <a href="cemara/index.html" class="project-card">
                <div class="card-icon">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <h2 class="card-title">互動式車流監測地圖</h2>
                <p class="card-desc">
                    桃園市路口車流變化展示系統。整合 Leaflet 地圖圖資與在地時段車流影片，提供早中晚三時段的真實車流觀測，搭配現代化直覺介面設計。
                </p>
                <div class="card-action">
                    <span>進入地圖系統</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <!-- Project 2: Simulation (Railroad Crossing) -->
            <a href="simulation/index.html" class="project-card">
                <div class="card-icon">
                    <i class="fa-solid fa-train-tram"></i>
                </div>
                <h2 class="card-title">台灣平交道交通模擬</h2>
                <p class="card-desc">
                    單線塞車路口轉彎回堵系統。基於 HTML5 Canvas 打造的 2D 俯視物理與跟車防撞模型，真實還原台灣在地平交道混亂交通與擁堵行為。
                </p>
                <div class="card-action">
                    <span>啟動模擬引擎</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>
        </div>
    </main>

</body>
</html>
